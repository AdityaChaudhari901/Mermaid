version: "1"

service:
  name: mermaid-converter
  description: "Serverless Mermaid Diagram Converter - PNG, SVG, Link Generation"

build:
  context: .
  dockerfile: Dockerfile

deploy:
  port: 5000
  minInstances: 1
  maxInstances: 3
  resources:
    cpu: "0.5"
    memory: "512Mi"

environment:
  - name: PYTHONUNBUFFERED
    value: "1"
  - name: PORT
    value: "5000"
