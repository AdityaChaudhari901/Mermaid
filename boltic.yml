service: mermaid-converter
runtime: python
region: us-east-1

functions:
  mermaid_converter:
    handler: serverless_handler.handler
    timeout: 60
    memory: 512
    events:
      - http:
          path: /mermaid/convert
          method: POST
      - http:
          path: /mermaid/convert
          method: OPTIONS

environment:
  PYTHONUNBUFFERED: 1

buildPack: python3.12

docker:
  image: python:3.12-slim
  workdir: /app
  commands:
    - pip install -r requirements.txt
